<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SmartQueue</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body class="auth-body">

    <div class="auth-container">

    <div class="auth-card">

        <div class="auth-logo">🏥</div>
        <h2>Create Account</h2>
        <p class="auth-subtitle" id="roleLabel">Register to access Smart Queue System</p>

        <form id="registerForm">

        <div class="input-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Enter your name" required>
        </div>

        <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter your email" required>
        </div>

        <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Create password" required>
        </div>

        <!-- Hidden role field - auto-filled from URL param -->
        <input type="hidden" id="role" value="">

        <button type="submit" class="btn-primary full-btn">Register</button>

        </form>

        <!-- Divider -->
        <div class="auth-divider">
          <span>OR</span>
        </div>

        <!-- Google Sign-Up — rendered by Google's API -->
        <div id="g_id_onload"
             data-client_id="387755545493-l8211r3kcs88fv990s08mt3k4cha4clr.apps.googleusercontent.com"
             data-context="signup"
             data-callback="handleGoogleRegisterResponse"
             data-auto_prompt="false">
        </div>
        <div class="g_id_signin"
             data-type="standard"
             data-shape="rectangular"
             data-theme="outline"
             data-text="signup_with"
             data-size="large"
             data-logo_alignment="left"
             data-width="300">
        </div>

        <script>
          // Auto-set role from URL parameter
          const urlParams = new URLSearchParams(window.location.search);
          const roleFromUrl = urlParams.get('role');
          if (roleFromUrl && ['patient', 'doctor', 'staff'].includes(roleFromUrl)) {
            document.getElementById('role').value = roleFromUrl;
            const roleNames = { patient: '🧑‍🦱 Patient', doctor: '👨‍⚕️ Doctor', staff: '👩‍💼 Staff' };
            document.getElementById('roleLabel').textContent = `Registering as ${roleNames[roleFromUrl]}`;
          } else {
            // If no role in URL, show role selector as fallback
            const roleInput = document.getElementById('role');
            const selectEl = document.createElement('select');
            selectEl.id = 'role';
            selectEl.required = true;
            selectEl.innerHTML = `
              <option value="">Choose role</option>
              <option value="patient">Patient</option>
              <option value="doctor">Doctor</option>
              <option value="staff">Staff</option>
            `;
            roleInput.replaceWith(selectEl);
            // Show the role selector with a label
            const wrapper = document.createElement('div');
            wrapper.className = 'input-group';
            const label = document.createElement('label');
            label.textContent = 'Select Role';
            selectEl.parentNode.insertBefore(wrapper, selectEl);
            wrapper.appendChild(label);
            wrapper.appendChild(selectEl);
          }
        </script>
        <script src="js/toast.js"></script>
        <script src="js/auth.js"></script>

        <p class="auth-footer">
        Already have an account? 
        <a href="login.html">Login here</a>
        </p>

    </div>
    </div>

</body>
</html>
